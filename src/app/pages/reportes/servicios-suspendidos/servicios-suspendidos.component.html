<app-sidebar></app-sidebar>

<div class="content">
  <div class="panel-header">
    <h2>Reporte de Servicios Suspendidos</h2>
    <div class="panel-subtitle">Servicios actualmente suspendidos</div>
  </div>

  <div class="table-card">
    <div class="section-title">Servicios suspendidos</div>

    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Cliente</th>
          <th>Dirección</th>
          <th>Fecha suspensión</th>
          <th>Motivo</th>
          <th>Estado</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of servicios">
          <td>{{ s.codigo_cliente }}</td>
          <td>{{ s.cliente }}</td>
          <td>{{ s.direccion }}</td>
          <td>{{ s.fecha_suspension }}</td>
          <td>{{ s.motivo }}</td>

          <td class="estado-vencida">
            {{ s.estado }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="form-card">
    <div class="section-title">Resumen de suspensiones por motivo</div>

    <canvas #grafico></canvas>
  </div>
</div>
